site_name: huchaoning/hcn Documentation
repo_url: https://github.com/huchaoning/hcn

theme:
  name: material
  language: en
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings
  - mkdocs-jupyter

nav:
  - Home: ""
  - Preamble setup: preamble
  - File IO utils: io
