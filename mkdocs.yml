site_name: HCN's Collections of Nonpareils (or Nonsense)

theme:
  name: material
  language: en
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings

nav:
  - Home: README.md
  # - API: api.md