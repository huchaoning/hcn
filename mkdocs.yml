site_name: huchaoning/hcn Documentation
repo_url: https://github.com/huchaoning/hcn


theme:
  name: material
  language: en
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.expand
    - content.code.copy


markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tabbed
  - toc:
      permalink: true


plugins:
  - search
  - mkdocstrings
  - mkdocs-jupyter:
      execute: true 
      include_requirejs: true
      kernel_name: python3
      custom_mathjax_url: "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/latest.js?config=TeX-AMS_CHTML-full,Safe"
      ignore_h1_titles: true


nav:
  - Home: index.ipynb
  - Preamble setup: preamble.ipynb
  - File IO utils: io.ipynb
